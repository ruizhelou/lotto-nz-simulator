<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Lotto NZ Simulator</title>
  </head>
  <body>
    <header>
      <img src="./icons/alms.png" class="icon" alt="">
      <div class="heading-wrapper">
        <h1 class="main-heading">Lotto New Zealand</h1>
        <h2 class="sub-heading">Simulator</h2>
      </div>
    </header>

    <main class="main-content">
      <aside class="card">
        <h2 class="sub-heading">Play Summary</h2>
        <ul class="play-summary">
          <li class="lines-owned">Lines owned: <span class="statistic"></span></li>
          <li class="lines-played">Lines played: <span class="statistic"></span></li>
          <li class="total-spent">Total spent: <span class="statistic"></span></li>
          <li class="total-won">Total won: <span class="statistic"></span></li>
          <li class="net-profit">Net profit: <span class="statistic"></span></li>
        </ul>
        <form action="" method="POST" class="line-selector">
          <button type="submit" class="buy-button">Buy</button>
          <select id="line-purchase-dropdown" name="line-purchase-dropdown" class="line-dropdown" aria-label="Select lotto line">
            <option value="1">1 line</option>
            <option value="4">4 lines</option>
            <option value="8">8 lines</option>
            <option value="10">10 lines</option>
            <option value="15">15 lines</option>
            <option value="20">20 lines</option>
            <option value="100">100 lines</option>
            <option value="100000">100,000 lines</option>
            <option value="1000000">1,000,000 lines</option>
          </select>
        </form>
      </aside>
      
      <div class="play-area">
        <section class="lotto-play card">
          <h2 class="sub-heading">Your Numbers</h2>
          <div class="play-controls">
            <button class="play-one-button disabled-button">Play One</button>
            <button class="play-all-button disabled-button">Play All</button>
          </div>
          <div class="ball-container">
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="bonus"><div class="ball"></div></div>
          </div>
        </section>

        <section class="lotto-result card">
          <h2 class="sub-heading">Winning Numbers</h2>
          <div class="play-controls">
            <button class="shuffle-button">Shuffle</button>
          </div>
          
          <div class="ball-container">
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="ball"></div>
            <div class="bonus"><div class="ball"></div></div>
          </div>
        </section>

        <section class="outcome card">
          <div class="outcome-header">
            <h2 class="sub-heading"></h2>
            <div class="outcome-fraction"></div>
          </div>
          <div class="outcome-prize"></div>
        </section>
      </div>
      
    </main>
  </body>
</html>
